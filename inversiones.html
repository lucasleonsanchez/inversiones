<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Inversiones Inmobiliarias</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#185FA5;--blue-l:#E6F1FB;--blue-m:#378ADD;--green:#3B6D11;--red:#A32D2D;--red-l:#FCEBEB;--amber-l:#FAEEDA;--border:0.5px solid #e0ddd6;--r:8px;--rl:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;font-size:14px;color:#1a1a18;background:#f8f7f4;min-height:100vh}
.wrap{max-width:1280px;margin:0 auto;padding:1rem 1.5rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:.5rem;flex-wrap:wrap}
.app-title{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
.app-sub{font-size:11px;color:#888780;margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:.32rem .75rem;border-radius:var(--r);border:var(--border);background:#fff;color:#1a1a18;cursor:pointer;font-size:12px;font-weight:500;line-height:1.4;transition:background .12s;text-decoration:none}
.btn:hover{background:#f1efe8}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#0C447C}
.btn-danger{background:var(--red-l);color:var(--red);border-color:#f7c1c1}
.btn-sm{padding:.18rem .45rem;font-size:11px}

/* Auth */
#auth-screen{position:fixed;inset:0;background:#f8f7f4;display:flex;align-items:center;justify-content:center;z-index:1000}
.auth-card{background:#fff;border:var(--border);border-radius:var(--rl);padding:2.5rem 2rem;text-align:center;max-width:360px;width:90%}
.auth-logo{font-size:36px;margin-bottom:1rem}
.auth-title{font-size:18px;font-weight:600;margin-bottom:.4rem}
.auth-sub{font-size:12px;color:#888780;margin-bottom:1.75rem;line-height:1.6}
.auth-btn{display:inline-flex;align-items:center;gap:10px;padding:.65rem 1.25rem;border-radius:var(--r);border:var(--border);background:#fff;color:#1a1a18;cursor:pointer;font-size:14px;font-weight:500;text-decoration:none;transition:background .12s;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.auth-btn:hover{background:#f8f7f4}
.auth-btn svg{flex-shrink:0}
.auth-err{font-size:12px;color:var(--red);margin-top:.85rem;padding:.4rem .7rem;background:var(--red-l);border-radius:var(--r);display:none;line-height:1.5}

/* Loading */
#loading{position:fixed;inset:0;background:rgba(248,247,244,.9);display:none;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:.75rem}
.spinner{width:28px;height:28px;border:2.5px solid #d3d1c7;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.loading-txt{font-size:12px;color:#888780}
@keyframes spin{to{transform:rotate(360deg)}}

/* KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:.85rem}
.kpi{background:#fff;border:var(--border);border-radius:var(--r);padding:.6rem .85rem;cursor:pointer;transition:border-color .12s}
.kpi:hover{border-color:#b4b2a9}
.kpi.on{border-color:var(--blue-m)}
.kpi-label{font-size:11px;color:#888780;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.kpi-val{font-size:20px;font-weight:600;line-height:1}
.kpi-sub{font-size:11px;color:#b4b2a9;margin-top:3px}

/* Charts */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.85rem}
.chart-card{background:#fff;border:var(--border);border-radius:var(--rl);padding:.75rem}
.chart-label{font-size:11px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.5rem}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:.4rem;margin-bottom:.5rem;flex-wrap:wrap}
.search-box{position:relative;flex:1;min-width:160px}
.search-box input{width:100%;padding:.3rem .5rem .3rem 1.8rem;border-radius:var(--r);border:var(--border);background:#fff;color:#1a1a18;font-size:12px}
.search-icon{position:absolute;left:.45rem;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.4;width:13px;height:13px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:.15rem .45rem;border-radius:99px;font-size:11px;background:var(--blue-l);color:#0C447C;border:0.5px solid #B5D4F4}
.chip .x{cursor:pointer;margin-left:1px}
.view-toggle{display:flex;border:var(--border);border-radius:var(--r);overflow:hidden}
.vbtn{padding:.28rem .65rem;font-size:11px;font-weight:500;cursor:pointer;border:none;background:#fff;color:#888780}
.vbtn:not(:last-child){border-right:var(--border)}
.vbtn.on{background:var(--blue);color:#fff}
.vbtn:hover:not(.on){background:#f1efe8}
.rcount{font-size:11px;color:#b4b2a9;white-space:nowrap}

/* Table */
.tbl-outer{background:#fff;border:var(--border);border-radius:var(--rl);overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead{background:#f8f7f4}
th{padding:0;border-bottom:var(--border);font-weight:600;font-size:12px;color:#888780;white-space:nowrap;position:relative}
.th-btn{display:flex;align-items:center;width:100%;padding:.4rem .5rem;cursor:pointer;gap:2px;background:none;border:none;color:inherit;font:inherit;text-align:left}
.th-btn:hover{background:#f1efe8;color:#1a1a18}
.th-btn.sorted{color:var(--blue)}
.th-sort{font-size:9px;opacity:.4;flex-shrink:0;margin-left:auto}
.th-btn.sorted .th-sort{opacity:1}
.th-num .th-btn{flex-direction:row-reverse}
td{padding:.38rem .5rem;border-bottom:var(--border);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr[data-id]:hover td{background:#EEF5FC;cursor:pointer;transition:background .1s}
.td-r{text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;padding:1px 6px;border-radius:99px;font-size:10px;font-weight:600}
.ba{background:#E6F1FB;color:#0C447C}.bi{background:#EAF3DE;color:#27500A}
.bc{background:#FAEEDA;color:#633806}.bd{background:#f1efe8;color:#5F5E5A}
.bce{background:#EAF3DE;color:#085041}.bp{background:#FAEEDA;color:#854F0B}
.rp{color:var(--green);font-weight:600}.rn{color:var(--red);font-weight:600}
.tbl-empty{text-align:center;padding:2.5rem;color:#b4b2a9;font-size:12px}

/* Dropdown */
.dd{position:absolute;top:100%;left:0;z-index:300;background:#fff;border:var(--border);border-radius:var(--rl);min-width:190px;max-width:230px;padding:.35rem 0;box-shadow:0 8px 24px rgba(0,0,0,.1)}
.dd-search{padding:.25rem .4rem;border-bottom:var(--border);margin-bottom:.2rem}
.dd-search input{width:100%;padding:.22rem .4rem;border-radius:5px;border:var(--border);font-size:11px;background:#fff}
.dd-list{max-height:180px;overflow-y:auto;padding:0 .25rem}
.dd-row{display:flex;align-items:center;gap:.35rem;padding:.26rem .35rem;border-radius:5px;cursor:pointer;font-size:11px}
.dd-row:hover{background:#f8f7f4}
.dd-row input[type=checkbox]{accent-color:var(--blue);cursor:pointer;width:12px;height:12px;flex-shrink:0}
.dd-foot{padding:.3rem .4rem 0;border-top:var(--border);margin-top:.2rem;display:flex;gap:.3rem;justify-content:flex-end}

/* Pager */
.pager{display:flex;align-items:center;justify-content:flex-end;gap:.3rem;margin-top:.5rem;flex-wrap:wrap}
.pager span{font-size:11px;color:#b4b2a9}
.pg{padding:.2rem .45rem;border-radius:5px;border:var(--border);background:#fff;cursor:pointer;font-size:11px}
.pg.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.pg:hover:not(.on){background:#f1efe8}

/* Form */
.page-wrap{background:#fff;border:var(--border);border-radius:var(--rl);padding:1.1rem}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:.55rem}
.ff{grid-column:1/-1}
.fl{display:block;font-size:10px;font-weight:600;color:#888780;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.fi input,.fi select,.fi textarea{width:100%;padding:.32rem .5rem;border-radius:var(--r);border:var(--border);background:#fff;color:#1a1a18;font-size:12px}
.fi input:focus,.fi select:focus,.fi textarea:focus{outline:none;border-color:var(--blue-m)}
.fi textarea{resize:vertical;min-height:54px}
.fdiv{grid-column:1/-1;font-size:10px;font-weight:600;color:#b4b2a9;text-transform:uppercase;letter-spacing:.06em;padding:.3rem 0 .2rem;border-bottom:var(--border);margin-top:.25rem}
.fcalc{font-size:12px;color:#888780;padding:.32rem .5rem;background:#f8f7f4;border-radius:var(--r);border:var(--border)}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem}
.det-row label{font-size:10px;color:#b4b2a9;text-transform:uppercase;letter-spacing:.04em;display:block}
.det-row p{font-size:12px;margin-top:1px}
.det-sec{font-size:10px;font-weight:600;color:#b4b2a9;text-transform:uppercase;letter-spacing:.06em;padding:.35rem 0 .15rem;border-bottom:var(--border);grid-column:1/-1;margin-top:.2rem}
.cfg-sec{margin-bottom:1rem}
.cfg-title{font-size:12px;font-weight:600;margin-bottom:.4rem}
.cfg-items{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.4rem}
.cfg-item{display:inline-flex;align-items:center;gap:.25rem;padding:.18rem .5rem;border-radius:99px;font-size:11px;border:var(--border);background:#fff}
.cfg-item.off{opacity:.4;text-decoration:line-through}
.cfg-item button{background:none;border:none;cursor:pointer;font-size:11px;color:#b4b2a9;padding:0}
.cfg-item button:hover{color:var(--red)}
.add-row{display:flex;gap:.3rem;margin-top:.3rem}
.add-row input{flex:1;padding:.28rem .5rem;border-radius:var(--r);border:var(--border);font-size:12px;background:#fff}
.sync-bar{font-size:11px;color:#888780;padding:.28rem .55rem;background:#f8f7f4;border-radius:var(--r);border:var(--border);display:flex;align-items:center;gap:.4rem}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#97C459;flex-shrink:0}
.sync-dot.err{background:#E24B4A}
.sync-dot.sync{background:#EF9F27;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">🏢</div>
    <div class="auth-title">Inversiones Inmobiliarias</div>
    <div class="auth-sub">Iniciá sesión con tu cuenta de Google para acceder a la base de datos compartida.</div>
    <a href="#" class="auth-btn" id="google-login-btn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Iniciar sesión con Google
    </a>
    <div class="auth-err" id="auth-err">No tenés acceso. Pedile al administrador que agregue tu email como usuario de prueba en Google Cloud Console.</div>
  </div>
</div>

<div id="loading" style="display:none">
  <div class="spinner"></div>
  <div class="loading-txt" id="loading-txt">Cargando…</div>
</div>

<div class="wrap" id="main-app" style="display:none">
  <div id="app"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────
const CLIENT_ID  = '260411653116-e0li9118s6dq2kfksj6v5fsrt6sd5cv8.apps.googleusercontent.com';
const SHEET_ID   = '1cU_Gd3J9Q32dDi_jfY9AbqNcNav7iYaaLxn-P2cbNNQ';
const SHEET_TAB  = 'Proyectos';
const SCOPES     = 'https://www.googleapis.com/auth/spreadsheets';
const REDIRECT   = 'https://lucasleonsanchez.github.io/inversiones/inversiones.html';

// ─── LISTS ────────────────────────────────────────────────────────────────
const L={
  tipo:['En pozo','En construcción','Llave en mano','Construido','Refacción','Lote'],
  estado:['En análisis','Pendiente info','Interesado','Descartado','Comprometido','Cerrado'],
  destino:['Vivienda propia','Renta','Reventa','A definir'],
  moneda:['USD','ARS','Mixto'],
  ajuste:['Precio fijo','Indexado CAC','Indexado inflación','A confirmar','Libre'],
  pago:['Contado','Cuotas en pesos','Cuotas en USD','Mixto','A convenir'],
  estructura:['Fideicomiso al costo','Fideicomiso inmobiliario','Escritura directa','Boleto','A confirmar'],
  provincia:['Buenos Aires','CABA','Córdoba','Santa Fe','Mendoza','Otro'],
  tipoInmueble:['Casa','Departamento','Departamento con cochera','PH','Cochera','Lote','Otro'],
  ambientes:['1','2','3','4','5','6 o más']
};
const DIS={tipo:new Set(),estado:new Set(),destino:new Set(),moneda:new Set(),ajuste:new Set(),pago:new Set(),estructura:new Set(),provincia:new Set(),tipoInmueble:new Set(),ambientes:new Set()};
const HEADERS=['id','proyecto','desarrollador','contacto','tel','estado','fechaConsulta','fechaFin','fechaReal','tipo','destino','m2cub','m2semi','m2desc','factorSemi','moneda','ajuste','costoTotal','precioVenta','formaPago','estructura','web','provincia','barrio','direccion','docOK','obs','tipoInmueble','ambientes','factorDesc'];

// ─── STATE ────────────────────────────────────────────────────────────────
let accessToken=null, projects=[], syncStatus='ok';
let sortCol='proyecto',sortDir=1,q='',kpiFilt=null,page=1,view='summary',openDD=null;
const PER=15;
let CF={},PF={};

// ─── HELPERS ──────────────────────────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const hom=p=>(+p.m2cub||0)+(+p.m2semi||0)*((+p.factorSemi)||.5)+(+p.m2desc||0)*((+p.factorDesc)||0);
const cm2=p=>{const h=hom(p);return h>0?(+p.costoTotal||0)/h:0};
const ren=p=>{const c=+p.costoTotal||0,v=+p.precioVenta||0;return c>0?(v-c)/c:0};
const fnum=n=>(n||n===0)?Math.round(n).toLocaleString('es-AR'):'-';
const fnum2=n=>(n||n===0)?parseFloat(n).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}):'-';
const fpct=n=>n?(n*100).toFixed(1)+'%':'-';
const fmoney=(n,mon,compact)=>{
  if(!n&&n!==0)return '-';
  const v=Math.round(n);
  if(compact&&mon==='ARS'){
    if(v>=1000000)return '$'+(v/1000000).toFixed(1).replace(/\.0$/,'')+'M';
    if(v>=1000)return '$'+Math.round(v/1000)+'k';
  }
  return '$'+v.toLocaleString('es-AR');
};
const fcm2=n=>n?'$'+parseFloat(n).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}):'-';
const bmap={'En análisis':'ba','Interesado':'bi','Comprometido':'bc','Descartado':'bd','Cerrado':'bce','Pendiente info':'bp'};
const showLoad=(v,txt)=>{
  const el=document.getElementById('loading');
  el.style.display=v?'flex':'none';
  if(txt)document.getElementById('loading-txt').textContent=txt;
};

// ─── OAUTH — REDIRECT FLOW ────────────────────────────────────────────────
function buildAuthUrl(){
  const params=new URLSearchParams({
    client_id:CLIENT_ID,
    redirect_uri:REDIRECT,
    response_type:'token',
    scope:SCOPES,
    prompt:'select_account'
  });
  return 'https://accounts.google.com/o/oauth2/v2/auth?'+params.toString();
}

function handleRedirectToken(){
  // Token comes back in URL hash after OAuth redirect
  const hash=location.hash.substring(1);
  if(!hash)return false;
  const params=new URLSearchParams(hash);
  const token=params.get('access_token');
  const error=params.get('error');
  // Clean URL
  history.replaceState(null,'',location.pathname);
  if(error){
    document.getElementById('auth-err').style.display='block';
    document.getElementById('auth-err').textContent=
      error==='access_denied'
        ? 'Acceso denegado. Pedile al administrador que agregue tu email como usuario de prueba en Google Cloud Console.'
        : 'Error de autenticación: '+error;
    return false;
  }
  if(token){
    accessToken=token;
    // Store with expiry (55 min)
    sessionStorage.setItem('inv_token',token);
    sessionStorage.setItem('inv_token_exp',Date.now()+55*60*1000);
    return true;
  }
  return false;
}

function checkStoredToken(){
  const token=sessionStorage.getItem('inv_token');
  const exp=+sessionStorage.getItem('inv_token_exp')||0;
  if(token&&Date.now()<exp){accessToken=token;return true;}
  return false;
}

async function init(){
  // 1. Check redirect token in URL
  const fromRedirect=handleRedirectToken();
  // 2. Check stored session token
  const hasStored=!fromRedirect&&checkStoredToken();

  if(fromRedirect||hasStored){
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('main-app').style.display='block';
    showLoad(true,'Cargando proyectos…');
    await loadProjects();
    showLoad(false);
    render();
  } else {
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('google-login-btn').href=buildAuthUrl();
  }
}

document.getElementById('google-login-btn').addEventListener('click',e=>{
  e.preventDefault();
  location.href=buildAuthUrl();
});

// ─── SHEETS API ───────────────────────────────────────────────────────────
const sheetsBase=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`;
const authH=()=>({'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'});

async function sheetRead(){
  const r=await fetch(`${sheetsBase}/values/${SHEET_TAB}!A1:AD`,{headers:authH()});
  if(r.status===401){sessionStorage.clear();location.href=buildAuthUrl();return[];}
  if(!r.ok)throw new Error('read '+r.status);
  const d=await r.json();
  const rows=d.values||[];
  if(rows.length<2)return[];
  return rows.slice(1).filter(r=>r[0]).map(r=>{
    const o={};
    HEADERS.forEach((h,i)=>o[h]=r[i]||'');
    const toNum=v=>parseFloat(String(v||'0').replace(/\./g,'').replace(',','.'))||0;
    const toNumDef=(v,def)=>{const n=parseFloat(String(v||'').replace(/\./g,'').replace(',','.'));return isNaN(n)?def:n;};
    o.m2cub=toNum(o.m2cub);o.m2semi=toNum(o.m2semi);o.m2desc=toNum(o.m2desc);
    o.factorSemi=toNumDef(o.factorSemi,0.5);o.factorDesc=toNumDef(o.factorDesc,0);o.costoTotal=toNum(o.costoTotal);o.precioVenta=toNum(o.precioVenta);
    return o;
  });
}

async function sheetAppend(p){
  const row=HEADERS.map(h=>p[h]??'');
  await fetch(`${sheetsBase}/values/${SHEET_TAB}!A1:AD:append?valueInputOption=USER_ENTERED`,{
    method:'POST',headers:authH(),body:JSON.stringify({values:[row]})
  });
}

async function sheetUpdate(p){
  const all=await sheetRead();
  const idx=all.findIndex(x=>x.id===p.id);
  if(idx<0)return sheetAppend(p);
  const rowNum=idx+2;
  const row=HEADERS.map(h=>p[h]??'');
  await fetch(`${sheetsBase}/values/${SHEET_TAB}!A${rowNum}:AD${rowNum}?valueInputOption=USER_ENTERED`,{
    method:'PUT',headers:authH(),body:JSON.stringify({values:[row]})
  });
}

async function sheetDelete(id){
  const all=await sheetRead();
  const idx=all.findIndex(x=>x.id===id);
  if(idx<0)return;
  const rowNum=idx+2;
  const meta=await fetch(`${sheetsBase}?fields=sheets.properties`,{headers:authH()});
  const md=await meta.json();
  const sheetGid=md.sheets.find(s=>s.properties.title===SHEET_TAB)?.properties.sheetId||0;
  await fetch(`${sheetsBase}:batchUpdate`,{
    method:'POST',headers:authH(),
    body:JSON.stringify({requests:[{deleteDimension:{range:{sheetId:sheetGid,dimension:'ROWS',startIndex:rowNum-1,endIndex:rowNum}}}]})
  });
}

async function loadProjects(){
  try{projects=await sheetRead();syncStatus='ok';}
  catch(e){syncStatus='err';console.error(e);}
}
async function saveProject(p,isNew){
  syncStatus='sync';updateSyncBar();
  try{if(isNew)await sheetAppend(p);else await sheetUpdate(p);await loadProjects();syncStatus='ok';}
  catch(e){syncStatus='err';console.error(e);}
  updateSyncBar();
}
async function deleteProject(id){
  syncStatus='sync';updateSyncBar();
  try{await sheetDelete(id);await loadProjects();syncStatus='ok';}
  catch(e){syncStatus='err';console.error(e);}
  updateSyncBar();
}
let lastSyncTime=null;
const updateSyncBar=()=>{
  const dot=document.getElementById('sync-dot'),tx=document.getElementById('sync-txt'),lm=document.getElementById('last-mod');
  if(!dot)return;
  dot.className='sync-dot'+(syncStatus==='err'?' err':syncStatus==='sync'?' sync':'');
  tx.textContent=syncStatus==='ok'?'Sincronizado':syncStatus==='sync'?'Guardando…':'Error de conexión';
  if(syncStatus==='ok') lastSyncTime=new Date();
  if(lm&&lastSyncTime){
    const h=lastSyncTime.getHours().toString().padStart(2,'0');
    const m=lastSyncTime.getMinutes().toString().padStart(2,'0');
    lm.textContent='· '+h+':'+m;
  }
};

// ─── FILTER / SORT ────────────────────────────────────────────────────────
const INMUEBLE_ICON={'Casa':'🏠','Departamento':'🏢','Departamento con cochera':'🏢','PH':'🏘','Cochera':'🅿️','Lote':'🌳','Otro':'📋'};
const colVal=(p,k)=>{
  if(k==='proyecto')return p.proyecto;
  if(k==='estado')return p.estado;
  if(k==='tipoInmueble')return p.tipoInmueble||'-';
  if(k==='ambientes')return p.ambientes||'-';
  if(k==='m2')return (p.m2cub?fnum(p.m2cub):'-')+' / '+(hom(p)?fnum(hom(p)):'-');
  if(k==='m2cub')return p.m2cub?fnum(p.m2cub):'-';
  if(k==='m2h')return hom(p)?fnum(hom(p)):'-';
  if(k==='cm2')return fcm2(cm2(p));
  if(k==='costos')return fmoney(p.costoTotal,p.moneda,true)+' / '+fmoney(p.precioVenta,p.moneda,true);
  if(k==='costo')return fmoney(p.costoTotal,p.moneda,true);
  if(k==='venta')return fmoney(p.precioVenta,p.moneda,true);
  if(k==='ren')return p.costoTotal&&p.precioVenta?fpct(ren(p)):'-';
  return '';
};
const baseRows=()=>{
  let r=[...projects];
  if(q){const lq=q.toLowerCase();r=r.filter(p=>(p.proyecto+p.desarrollador+p.barrio+p.estado).toLowerCase().includes(lq));}
  if(kpiFilt){
    if(kpiFilt.t==='estado')r=r.filter(p=>p.estado===kpiFilt.v);
    else if(kpiFilt.t==='barrio')r=r.filter(p=>p.barrio===kpiFilt.v);
    else if(kpiFilt.t==='tipo')r=r.filter(p=>p.tipo===kpiFilt.v);
  }
  return r;
};
const withCF=rows=>{
  let r=[...rows];
  Object.entries(CF).forEach(([k,s])=>{if(s&&s.size>0)r=r.filter(p=>s.has(colVal(p,k)))});
  return r;
};
const sorted=rows=>{
  const r=[...rows];
  r.sort((a,b)=>{
    let av,bv;
    if(sortCol==='m2'||sortCol==='m2h'){av=hom(a);bv=hom(b);}
    else if(sortCol==='cm2'){av=cm2(a);bv=cm2(b);}
    else if(sortCol==='ren'){av=ren(a);bv=ren(b);}
    else if(sortCol==='m2cub'){av=+a.m2cub||0;bv=+b.m2cub||0;}
    else if(sortCol==='costos'||sortCol==='costo'){av=+a.costoTotal||0;bv=+b.costoTotal||0;}
    else if(sortCol==='venta'){av=+a.precioVenta||0;bv=+b.precioVenta||0;}
    else{av=a[sortCol]||'';bv=b[sortCol]||'';}
    if(typeof av==='number'&&typeof bv==='number')return(av-bv)*sortDir;
    return String(av).localeCompare(String(bv))*sortDir;
  });
  return r;
};
const uniq=col=>{
  const base=baseRows();
  let r=base;
  Object.entries(CF).filter(([k])=>k!==col).forEach(([k,s])=>{if(s&&s.size>0)r=r.filter(p=>s.has(colVal(p,k)))});
  return[...new Set(r.map(p=>colVal(p,col)))].sort();
};

// ─── KPI DATA ─────────────────────────────────────────────────────────────
const kd=()=>{
  const ac=projects.filter(p=>p.estado!=='Descartado');
  const rs=ac.filter(p=>+p.costoTotal&&+p.precioVenta).map(p=>ren(p));
  const avg=rs.length?rs.reduce((a,b)=>a+b,0)/rs.length:0;
  const byE={};projects.forEach(p=>{byE[p.estado]=(byE[p.estado]||0)+1});
  const byB={};ac.forEach(p=>{if(p.barrio)byB[p.barrio]=(byB[p.barrio]||0)+1});
  const byT={};
  ac.filter(p=>+p.costoTotal&&hom(p)>0).forEach(p=>{
    if(!byT[p.tipo])byT[p.tipo]={s:0,n:0};
    byT[p.tipo].s+=cm2(p);byT[p.tipo].n++;
  });
  const cbt={};Object.entries(byT).forEach(([k,v])=>cbt[k]=v.s/v.n);
  return{avg,byE,byB,cbt,total:projects.length,ac:ac.length};
};

// ─── DROPDOWN ─────────────────────────────────────────────────────────────
const ddHTML=col=>{
  const vals=uniq(col);

      ${vals.map(v=>`<div class="dd-row" onclick="ddTog('${col}','${v.replace(/'/g,"\\'")}')"><input type="checkbox" data-v="${v}" ${pend.has(v)?'checked':''} onclick="event.stopPropagation();ddTog('${col}','${v.replace(/'/g,"\\'")}')"><span>${v}</span></div>`).join('')}

const ddRefresh=col=>{
  const vals=uniq(col),pend=PF[col]||new Set(vals);

window.ddAll=col=>{const vals=uniq(col);if(!PF[col])PF[col]=new Set(vals);const p=PF[col];vals.every(v=>p.has(v))?p.clear():vals.forEach(v=>p.add(v));ddRefresh(col)};
window.ddTog=(col,v)=>{const vals=uniq(col);if(!PF[col])PF[col]=new Set(vals);const p=PF[col];p.has(v)?p.delete(v):p.add(v);ddRefresh(col)};
window.ddSearch=(col,s)=>{document.querySelectorAll(`#ddl-${col} .dd-row:not(:first-child)`).forEach(r=>{r.style.display=r.querySelector('span')?.textContent?.toLowerCase().includes(s.toLowerCase())?'':'none'})};
window.ddApply=col=>{const vals=uniq(col),p=PF[col]||new Set(vals);vals.every(v=>p.has(v))?delete CF[col]:CF[col]=new Set(p);openDD=null;page=1;render()};
window.ddClear=col=>{delete CF[col];delete PF[col];openDD=null;page=1;render()};

const thHTML=(col,label,w,num)=>{

};

  document.getElementById('xCF')?.addEventListener('click',()=>{CF={};PF={};page=1;render()});
  document.getElementById('bNew')?.addEventListener('click',()=>openForm(null));
  document.getElementById('bCfg')?.addEventListener('click',renderCfg);
  document.getElementById('bRef')?.addEventListener('click',async()=>{showLoad(true,'Recargando…');await loadProjects();showLoad(false);render()});
  document.getElementById('vSum')?.addEventListener('click',()=>{view='summary';render()});
  document.getElementById('vFull')?.addEventListener('click',()=>{view='full';render()});
  document.getElementById('kAna')?.addEventListener('click',()=>{kpiFilt={t:'estado',v:'En análisis'};page=1;render()});
  document.getElementById('kCom')?.addEventListener('click',()=>{kpiFilt={t:'estado',v:'Comprometido'};page=1;render()});
  document.getElementById('kAll')?.addEventListener('click',()=>{kpiFilt=null;page=1;render()});
  document.querySelectorAll('[data-act="det"]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();openDet(b.dataset.id)}));
  document.querySelectorAll('[data-act="ed"]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();openForm(b.dataset.id)}));
  document.querySelectorAll('[data-act="dup"]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();dupProject(b.dataset.id)}));
  document.querySelectorAll('[data-pg]').forEach(b=>b.addEventListener('click',()=>{page=parseInt(b.dataset.pg);render()}));
  document.querySelectorAll('.th-btn').forEach(btn=>btn.addEventListener('click',e=>{
    if(e.target.closest('.dd'))return;
    const col=btn.dataset.col;
    // for sort-only cols (fused), just sort
    const noFilterCols=['m2','costos'];
    if(noFilterCols.includes(col)){
      if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}
      render();return;
    }
    PF[col]=CF[col]&&CF[col].size>0?new Set(CF[col]):new Set(uniq(col));
    openDD=openDD===col?null:col;render();
  }));
  let dbl=null;
  document.querySelectorAll('tr[data-id]').forEach(tr=>{
    tr.addEventListener('click',e=>{
      if(e.target.closest('button'))return;
      if(dbl){clearTimeout(dbl);dbl=null;openForm(tr.dataset.id);return;}
      dbl=setTimeout(()=>{dbl=null;openDet(tr.dataset.id)},260);
    });
  });
  document.addEventListener('click',e=>{
    if(openDD&&!e.target.closest('#dd-'+openDD)&&!e.target.closest('.th-btn')){openDD=null;render();}
  },{once:true});
}

// ─── DUPLICATE ────────────────────────────────────────────────────────────────
const dupProject=id=>{
  const src=projects.find(x=>x.id===id);
  if(!src)return;
  // Deep copy, assign new id, clear name so user knows it's a copy
  const copy={...src, id:uid(), proyecto:src.proyecto+' (copia)'};
  openForm(null, copy);
};

// ─── FORM ─────────────────────────────────────────────────────────────────
const openForm=(id, prefill)=>{
  const blank={id:uid(),proyecto:'',desarrollador:'',contacto:'',tel:'',estado:'En análisis',fechaConsulta:'',fechaFin:'',fechaReal:'',tipo:'',destino:'',tipoInmueble:'',ambientes:'',m2cub:'',m2semi:'',m2desc:'',factorSemi:0.5,factorDesc:0,moneda:'USD',ajuste:'',costoTotal:'',precioVenta:'',formaPago:'',estructura:'',web:'',provincia:'',barrio:'',direccion:'',docOK:'',obs:''};
  const p=id?projects.find(x=>x.id===id):(prefill||blank);
  const isNew=!id;
  const sel=(k,v,fid)=>`<select id="${fid}">${L[k].filter(x=>!DIS[k].has(x)).map(x=>`<option${x===v?' selected':''}>${x}</option>`).join('')}</select>`;
  const h=hom(p),c=cm2(p),r=ren(p);
  document.getElementById('app').innerHTML=`
<div class="topbar">
  <button class="btn" id="bBack">← Volver</button>
  <div class="app-title" style="font-size:15px">${isNew?'Nuevo proyecto':'Editar: '+p.proyecto}</div>
  <div></div>
</div>
<div class="page-wrap">
<div class="fg">
  <div class="fdiv">Identificación</div>
  <div class="fi"><label class="fl">Proyecto *</label><input id="fp" value="${p.proyecto}"></div>
  <div class="fi"><label class="fl">Desarrollador</label><input id="fd" value="${p.desarrollador}"></div>
  <div class="fi"><label class="fl">Contacto</label><input id="fc" value="${p.contacto}"></div>
  <div class="fi"><label class="fl">Teléfono / mail</label><input id="ft" value="${p.tel}"></div>
  <div class="fi"><label class="fl">Estado</label>${sel('estado',p.estado,'fe')}</div>
  <div class="fi"><label class="fl">Destino</label>${sel('destino',p.destino,'fde')}</div>
  <div class="fdiv">Fechas &amp; tipo</div>
  <div class="fi"><label class="fl">Fecha consulta</label><input type="date" id="ffc" value="${p.fechaConsulta}"></div>
  <div class="fi"><label class="fl">Fecha fin estimada</label><input type="date" id="fff" value="${p.fechaFin}"></div>
  <div class="fi"><label class="fl">Fecha entrega real</label><input type="date" id="ffr" value="${p.fechaReal}"></div>
  <div class="fi"><label class="fl">Tipo de proyecto</label>${sel('tipo',p.tipo,'fti')}</div>
  <div class="fi"><label class="fl">Tipo de inmueble</label>${sel('tipoInmueble',p.tipoInmueble,'ftin')}</div>
  <div class="fi"><label class="fl">Ambientes</label>${sel('ambientes',p.ambientes,'famb')}</div>
  <div class="fdiv">Superficies (m²)</div>
  <div class="fi"><label class="fl">m² cubiertos</label><input type="number" id="fmc" value="${p.m2cub}" min="0" step="0.01"></div>
  <div class="fi"><label class="fl">m² semi cubiertos</label><input type="number" id="fms" value="${p.m2semi}" min="0" step="0.01"></div>
  <div class="fi"><label class="fl">m² descubiertos</label><input type="number" id="fmd" value="${p.m2desc}" min="0" step="0.01"></div>
  <div class="fi"><label class="fl">Factor homog. semi (def. 0.5)</label><input type="number" id="ffs" value="${p.factorSemi||0.5}" step=".05" min="0" max="1"></div>
  <div class="fi"><label class="fl">Factor homog. desc. (def. 0)</label><input type="number" id="ffd" value="${p.factorDesc||0}" step=".05" min="0" max="1"></div>
  <div class="fi"><label class="fl">m² homogeneizados</label><div class="fcalc" id="ch">${h?fnum(h):'-'}</div></div>
  <div class="fdiv">Financiero</div>
  <div class="fi"><label class="fl">Moneda</label>${sel('moneda',p.moneda,'fmo')}</div>
  <div class="fi"><label class="fl">Ajuste de precio</label>${sel('ajuste',p.ajuste,'faj')}</div>
  <div class="fi"><label class="fl">Costo total</label><input type="number" id="fct" value="${p.costoTotal}" min="0"></div>
  <div class="fi"><label class="fl">Precio venta estimado</label><input type="number" id="fpv" value="${p.precioVenta}" min="0"></div>
  <div class="fi"><label class="fl">Costo / m²</label><div class="fcalc" id="cc">${c?'$'+Math.round(c).toLocaleString('es-AR'):'-'}</div></div>
  <div class="fi"><label class="fl">Rentabilidad estimada</label><div class="fcalc" id="cr" style="color:${r>0?'#3B6D11':r<0?'#A32D2D':'inherit'}">${p.costoTotal&&p.precioVenta?fpct(r):'-'}</div></div>
  <div class="fdiv">Comercial</div>
  <div class="fi"><label class="fl">Forma de pago</label>${sel('pago',p.formaPago,'fpa')}</div>
  <div class="fi"><label class="fl">Estructura legal</label>${sel('estructura',p.estructura,'fes')}</div>
  <div class="fi ff"><label class="fl">Publicación web</label><input id="fw" value="${p.web}" placeholder="https://…"></div>
  <div class="fdiv">Ubicación</div>
  <div class="fi"><label class="fl">Provincia</label>${sel('provincia',p.provincia,'fpr')}</div>
  <div class="fi"><label class="fl">Barrio / Localidad</label><input id="fb" value="${p.barrio}"></div>
  <div class="fi ff"><label class="fl">Dirección</label><input id="fdir" value="${p.direccion}"></div>
  <div class="fdiv">Gestión</div>
  <div class="fi"><label class="fl">Documentación OK</label><select id="fdo"><option value="">-</option><option${p.docOK==='Sí'?' selected':''}>Sí</option><option${p.docOK==='No'?' selected':''}>No</option><option${p.docOK==='Parcial'?' selected':''}>Parcial</option></select></div>
  <div class="fi ff"><label class="fl">Observaciones</label><textarea id="fo">${p.obs||''}</textarea></div>
</div>
<div style="display:flex;justify-content:flex-end;gap:.4rem;margin-top:.85rem;padding-top:.65rem;border-top:var(--border)">
  ${!isNew?`<button class="btn btn-danger" id="bDel">Eliminar proyecto</button>`:''}
  <button class="btn" id="bCan">Cancelar</button>
  <button class="btn btn-primary" id="bSav">Guardar proyecto</button>
</div>
</div>`;

  const upd=()=>{
    const t={m2cub:+document.getElementById('fmc')?.value||0,m2semi:+document.getElementById('fms')?.value||0,m2desc:+document.getElementById('fmd')?.value||0,factorSemi:+document.getElementById('ffs')?.value||.5,factorDesc:+document.getElementById('ffd')?.value||0,costoTotal:+document.getElementById('fct')?.value||0,precioVenta:+document.getElementById('fpv')?.value||0};
    const hv=hom(t),cv2=cm2(t),rv=ren(t);
    const eh=document.getElementById('ch'),ec=document.getElementById('cc'),er=document.getElementById('cr');
    if(eh)eh.textContent=hv?fnum2(hv):'-'; // hom uses factorSemi+factorDesc
    if(ec)ec.textContent=cv2?'$'+Math.round(cv2).toLocaleString('es-AR'):'-';
    if(er){er.textContent=t.costoTotal&&t.precioVenta?fpct(rv):'-';er.style.color=rv>0?'#3B6D11':rv<0?'#A32D2D':'inherit';}
  };
  ['fmc','fms','fmd','ffs','ffd','fct','fpv'].forEach(x=>document.getElementById(x)?.addEventListener('input',upd));
  const fv=x=>document.getElementById(x)?.value||'';
  const fn=x=>+document.getElementById(x)?.value||0;
  const fd=x=>parseFloat(document.getElementById(x)?.value)||0;
  document.getElementById('bBack')?.addEventListener('click',render);
  document.getElementById('bCan')?.addEventListener('click',render);
  document.getElementById('bDel')?.addEventListener('click',async()=>{
    if(!confirm('¿Eliminar este proyecto? Esta acción no se puede deshacer.'))return;
    showLoad(true,'Eliminando…');await deleteProject(id);showLoad(false);render();
  });
  document.getElementById('bSav')?.addEventListener('click',async()=>{
    const np={id:p.id,proyecto:fv('fp'),desarrollador:fv('fd'),contacto:fv('fc'),tel:fv('ft'),estado:fv('fe'),destino:fv('fde'),fechaConsulta:fv('ffc'),fechaFin:fv('fff'),fechaReal:fv('ffr'),tipo:fv('fti'),tipoInmueble:fv('ftin'),ambientes:fv('famb'),m2cub:fd('fmc'),m2semi:fd('fms'),m2desc:fd('fmd'),factorSemi:fd('ffs')||.5,factorDesc:fd('ffd')||0,moneda:fv('fmo'),ajuste:fv('faj'),costoTotal:fn('fct'),precioVenta:fn('fpv'),formaPago:fv('fpa'),estructura:fv('fes'),web:fv('fw'),provincia:fv('fpr'),barrio:fv('fb'),direccion:fv('fdir'),docOK:fv('fdo'),obs:fv('fo')};
    if(!np.proyecto){alert('El nombre del proyecto es obligatorio');return;}
    showLoad(true,'Guardando…');await saveProject(np,isNew);showLoad(false);render();
  });
};

// ─── DETAIL ───────────────────────────────────────────────────────────────
const openDet=id=>{
  const p=projects.find(x=>x.id===id);if(!p)return;
  const r=ren(p);
  const row=(l,v)=>`<div class="det-row"><label>${l}</label><p>${v||'-'}</p></div>`;
  document.getElementById('app').innerHTML=`
<div class="topbar">
  <button class="btn" id="bBk">← Volver</button>
  <div style="flex:1"><div class="app-title" style="font-size:15px">${p.proyecto}</div><div class="app-sub">${p.desarrollador} · <span class="badge ${bmap[p.estado]||''}">${p.estado}</span></div></div>
  <button class="btn" id="bDup">⧉ Duplicar</button>
  <button class="btn btn-primary" id="bEd">✏️ Editar</button>
</div>
<div class="page-wrap">
<div class="det-grid">
  <div class="det-sec">Identificación</div>
  ${row('Contacto',p.contacto)}${row('Tel / mail',p.tel)}${row('Tipo',p.tipo)}${row('Destino',p.destino)}${row('Tipo inmueble',p.tipoInmueble)}${row('Ambientes',p.ambientes)}
  <div class="det-sec">Fechas</div>
  ${row('Consulta',p.fechaConsulta)}${row('Fin estimada',p.fechaFin)}${row('Entrega real',p.fechaReal||'—')}
  <div class="det-sec">Superficies</div>
  ${row('m² cubiertos',fnum2(p.m2cub))}${row('m² semi cubiertos',fnum2(p.m2semi))}${row('m² descubiertos',fnum2(p.m2desc))}${row('Factor homog. semi',p.factorSemi||0.5)}${row('Factor homog. desc.',p.factorDesc||0)}${row('m² homogeneizados',fnum2(hom(p)))}
  <div class="det-sec">Financiero</div>
  ${row('Moneda',p.moneda)}${row('Ajuste',p.ajuste)}${row('Costo total',fmoney(p.costoTotal,p.moneda,false))}${row('Precio venta est.',fmoney(p.precioVenta,p.moneda,false))}${row('Costo/m²',fcm2(cm2(p)))}<div class="det-row"><label>Rentabilidad est.</label><p style="color:${r>0?'#3B6D11':r<0?'#A32D2D':'inherit'};font-weight:600">${fpct(r)}</p></div>
  <div class="det-sec">Comercial</div>
  ${row('Forma de pago',p.formaPago)}${row('Estructura legal',p.estructura)}<div class="det-row" style="grid-column:1/-1">${row('Web',p.web?`<a href="${p.web}" target="_blank" style="color:var(--blue)">${p.web}</a>`:'-')}</div>
  <div class="det-sec">Ubicación</div>
  ${row('Provincia',p.provincia)}${row('Barrio',p.barrio)}<div class="det-row" style="grid-column:1/-1">${row('Dirección',p.direccion)}</div>
  <div class="det-sec">Gestión</div>
  ${row('Doc. OK',p.docOK)}<div class="det-row" style="grid-column:1/-1">${row('Observaciones',p.obs)}</div>
</div>
</div>`;
  document.getElementById('bBk')?.addEventListener('click',render);
  document.getElementById('bDup')?.addEventListener('click',()=>dupProject(id));
  document.getElementById('bEd')?.addEventListener('click',()=>openForm(id));
};

// ─── CONFIG LISTAS ────────────────────────────────────────────────────────
const renderCfg=()=>{
  const names={tipo:'Tipo de proyecto',tipoInmueble:'Tipo de inmueble',ambientes:'Ambientes',estado:'Estado',destino:'Destino',moneda:'Moneda',ajuste:'Ajuste de precio',pago:'Forma de pago',estructura:'Estructura legal',provincia:'Provincia'};
  document.getElementById('app').innerHTML=`
<div class="topbar">
  <button class="btn" id="bBkC">← Volver</button>
  <div class="app-title" style="font-size:15px">Configuración de listas</div>
  <div></div>
</div>
<div class="page-wrap">
${Object.entries(names).map(([k,label])=>`
<div class="cfg-sec">
  <div class="cfg-title">${label}</div>
  <div class="cfg-items">${L[k].map(v=>`<span class="cfg-item${DIS[k].has(v)?' off':''}">
    ${v}
    <button onclick="cfgTog('${k}','${v.replace(/'/g,"\\'")}')" title="${DIS[k].has(v)?'Habilitar':'Deshabilitar'}">${DIS[k].has(v)?'👁':'🚫'}</button>
    <button onclick="cfgDel('${k}','${v.replace(/'/g,"\\'")}')" title="Eliminar">✕</button>
  </span>`).join('')}</div>
  <div class="add-row">
    <input type="text" id="add-${k}" placeholder="Nueva opción…" maxlength="40">
    <button class="btn btn-sm btn-primary" onclick="cfgAdd('${k}')">+ Agregar</button>
  </div>
</div>`).join('')}
</div>`;
  document.getElementById('bBkC')?.addEventListener('click',render);
};
window.cfgTog=(k,v)=>{DIS[k].has(v)?DIS[k].delete(v):DIS[k].add(v);renderCfg()};
window.cfgDel=(k,v)=>{if(!confirm(`¿Eliminar "${v}"?`))return;L[k]=L[k].filter(x=>x!==v);DIS[k].delete(v);renderCfg()};
window.cfgAdd=k=>{const inp=document.getElementById('add-'+k);const v=(inp?.value||'').trim();if(!v)return;if(!L[k].includes(v))L[k].push(v);if(inp)inp.value='';renderCfg()};

// ─── START ────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
